<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Fetch API CRUD</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header><h1>Fetch API CRUD (Szerver adatok)</h1></header>
    <main>
        <button onclick="loadUsers()">Adatok lekérése</button>
        <div id="userList"></div>
    </main>

    <script>
        async function loadUsers() {
            const res = await fetch('https://jsonplaceholder.typicode.com/users');
            const data = await res.json();
            const container = document.getElementById('userList');
            container.innerHTML = data.slice(0, 5).map(u => `
                <div class="item">
                    <span><strong>${u.name}</strong> (${u.email})</span>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
