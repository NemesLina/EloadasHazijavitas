<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SPA - React Apps</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- 1. Alkalmazás: Egyszerű Számológép ---
        function Calculator() {
            const [num, setNum] = useState(0);
            return (
                <div>
                    <h3>Egyszerű számláló (Calc szimuláció)</h3>
                    <h2>{num}</h2>
                    <button onClick={() => setNum(num + 1)}>+1</button>
                    <button onClick={() => setNum(num - 1)}>-1</button>
                    <button onClick={() => setNum(0)}>Reset</button>
                </div>
            );
        }

        // --- 2. Alkalmazás: Üzenőfal (Tic-Tac-Toe nehézségi szint) ---
        function SimpleNotes() {
            const [note, setNote] = useState("");
            const [notes, setNotes] = useState([]);
            return (
                <div>
                    <h3>Jegyzetek</h3>
                    <input value={note} onChange={e => setNote(e.target.value)} />
                    <button onClick={() => { setNotes([...notes, note]); setNote(""); }}>Mentés</button>
                    <ul>{notes.map((n, i) => <li key={i}>{n}</li>)}</ul>
                </div>
            );
        }

        function App() {
            const [view, setView] = useState('calc'); // Ez az SPA lelke (állapot alapú navigáció)

            return (
                <div>
                    <header><h1>Single Page Application</h1></header>
                    <nav>
                        <button onClick={() => setView('calc')}>Számológép</button>
                        <button onClick={() => setView('notes')}>Jegyzetek</button>
                        <a href="index.html" style={{marginLeft:'20px'}}>Főoldal</a>
                    </nav>
                    <main>
                        {view === 'calc' ? <Calculator /> : <SimpleNotes />}
                    </main>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
